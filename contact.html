<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Section</title>

    <link rel="stylesheet" href="contact.css">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <section class="contact-section" id="contact">

                </p>

                <div class="info-box">
                    <i class="fa-solid fa-envelope"></i>
                    <span>sharmabhishek1410@gmail.com</span>
                </div>

                <div class="info-box">
                    <i class="fa-solid fa-phone"></i>
                    <span>+91 8081718217</span>
                </div>

                <div class="info-box">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Lucknow, India</span>
                </div>

                <!-- SOCIAL ICONS -->

                <div class="social-icons">

                    <a href="https://github.com/sharmabhishek1410-prog">
                        <i class="fa-brands fa-github"></i>
                    </a>

                    <a href="https://www.linkedin.com/in/abhishek-sharma-7142943b4">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>

                </div>

            </div>

            <!-- RIGHT SIDE IMAGE -->

            <div class="contact-image">

                <img src="portfolio_image.png" alt="Profile Photo">

            </div>

        </div>

    </section>
    <script src="contact.js"></script>

</body>

</html>
